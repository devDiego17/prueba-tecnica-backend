services:
  payment_db:
    image: postgres:15
    container_name: payment_db
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD es requerido}
      POSTGRES_DB: ${DB_NAME:-payments_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-user} -d ${DB_NAME:-payments_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - app-network
    restart: unless-stopped

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    environment:
      DATABASE_URL: postgresql://${DB_USER:-user}:${DB_PASSWORD:?DB_PASSWORD es requerido}@payment_db:5432/${DB_NAME:-payments_db}?schema=public
      PORT: 3001
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3001:3001"
    depends_on:
      payment_db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    environment:
      DATABASE_URL: postgresql://${DB_USER:-user}:${DB_PASSWORD:?DB_PASSWORD es requerido}@payment_db:5432/${DB_NAME:-payments_db}?schema=public
      PORT: 3002
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3002:3002"
    depends_on:
      payment_db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    environment:
      PORT: 3000
      PAYMENT_SERVICE_URL: http://payment-service:3001
      NOTIFICATION_SERVICE_URL: http://notification-service:3002
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET es requerido}
    ports:
      - "3000:3000"
    depends_on:
      - payment-service
      - notification-service
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
